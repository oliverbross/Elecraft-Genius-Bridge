server:
  # Safe default for MVP. Use 0.0.0.0 only after you understand the security notes.
  bind_ip: 127.0.0.1

pgxl:
  enabled: true
  port: 9008
  aethersdr_compat: false
  compat_profile: aethersdr
  strict_emulation: false
  startup_delay_ms: 0
  force_direct_connected_test: false

tgxl:
  enabled: true
  port: 9010
  aethersdr_compat: false
  smartsdr_compat: false
  control_profile: readonly
  strict_emulation: false
  startup_delay_ms: 0
  force_presence_test: false
  experimental_presence_refresh: false

kpa500:
  enabled: true
  com_port: COM21
  baud: 38400
  polling_interval_ms: 1000
  mock: true
  dry_run: true
  allow_rf_risk: false

kat500:
  enabled: true
  com_port: COM8
  baud: 38400
  polling_interval_ms: 1000
  mock: true
  dry_run: true
  allow_rf_risk: false

security:
  # Reserved for a later authenticated API/control plane.
  token:

logging:
  level: info
  protocol_trace: false
  # When set, EGB writes one raw PGXL/TGXL transcript file per client session.
  protocol_transcript_dir:
  # When set, EGB writes one raw serial transcript file per device session.
  serial_transcript_dir:
  transcript_rotate_bytes: 1048576

metrics:
  enabled: false
  bind_ip: 127.0.0.1
  port: 9160

control:
  verify_delay_ms: 200

flex_injection:
  # Phase 17 passive Flex API registration. Disabled by default.
  enabled: false
  radio_ip: 127.0.0.1
  radio_port: 4992
  amplifier_ip: 127.0.0.1
  force_advertised_pgxl_ip:
  amplifier_port: 9008
  amplifier_model: PowerGeniusXL
  serial: EGB-KPA500
  handle: amp_1
  ant_map: ANT1:PORTA,ANT2:PORTB
  full_pgxl_registration: true
  create_meters: true
  create_interlock: true
  amplifier_status_profile: pgxl_paired
  amplifier_reannounce_interval_ms: 5000
  reconnect_initial_ms: 1000
  reconnect_max_ms: 30000
  ping_interval_ms: 30000
  tuner_refresh_interval_ms: 5000

mock:
  pgxl_fault: false
  tgxl_fault: false
  high_swr: false
