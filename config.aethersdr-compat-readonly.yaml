server:
  # Use 127.0.0.1 for local testing, or a specific private LAN IP for macOS AetherSDR.
  bind_ip: 127.0.0.1

pgxl:
  enabled: true
  port: 9008
  aethersdr_compat: true
  strict_emulation: false
  startup_delay_ms: 0
  force_direct_connected_test: false

tgxl:
  enabled: true
  port: 9010
  aethersdr_compat: true
  smartsdr_compat: true
  strict_emulation: false
  startup_delay_ms: 0
  force_presence_test: false

kpa500:
  enabled: true
  com_port: COM21
  baud: 38400
  polling_interval_ms: 1000
  mock: false
  dry_run: true
  allow_rf_risk: false

kat500:
  enabled: true
  com_port: COM8
  baud: 38400
  polling_interval_ms: 1000
  mock: false
  dry_run: true
  allow_rf_risk: false

security:
  token:

logging:
  level: debug
  protocol_trace: true
  protocol_transcript_dir: logs/protocol
  serial_transcript_dir: logs/serial
  transcript_rotate_bytes: 1048576

metrics:
  enabled: true
  bind_ip: 127.0.0.1
  port: 9160

control:
  verify_delay_ms: 200

flex_injection:
  enabled: false
  radio_ip: 127.0.0.1
  radio_port: 4992
  amplifier_ip: 127.0.0.1
  amplifier_port: 9008
  amplifier_model: PowerGeniusXL
  serial: EGB-KPA500
  handle: amp_1
  ant_map: ANT1:PORTA,ANT2:PORTB
  full_pgxl_registration: true
  create_meters: true
  create_interlock: true
  reconnect_initial_ms: 1000
  reconnect_max_ms: 30000
  ping_interval_ms: 30000

mock:
  pgxl_fault: false
  tgxl_fault: false
  high_swr: false
