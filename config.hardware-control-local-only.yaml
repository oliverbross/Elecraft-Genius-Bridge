server:
  # Use 127.0.0.1 for local tests, or replace with a private LAN IP only.
  bind_ip: 127.0.0.1

pgxl:
  enabled: true
  port: 9008
  strict_emulation: false
  startup_delay_ms: 0

tgxl:
  enabled: true
  port: 9010
  strict_emulation: false
  startup_delay_ms: 0
  force_presence_test: false

kpa500:
  enabled: true
  com_port: COM21
  baud: 38400
  polling_interval_ms: 1000
  mock: false
  dry_run: false

kat500:
  enabled: true
  com_port: COM8
  baud: 38400
  polling_interval_ms: 1000
  mock: false
  # Keep tuner controls blocked until a separate KAT500 control phase.
  dry_run: true

security:
  token:

logging:
  level: debug
  protocol_trace: true
  protocol_transcript_dir: logs/protocol
  serial_transcript_dir: logs/serial

metrics:
  enabled: true
  bind_ip: 127.0.0.1
  port: 9160

control:
  verify_delay_ms: 200

mock:
  pgxl_fault: false
  tgxl_fault: false
  high_swr: false
