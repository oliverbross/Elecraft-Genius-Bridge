server:
  # Keep loopback until the COM read-only test passes locally.
  bind_ip: 127.0.0.1

pgxl:
  enabled: true
  port: 9008
  strict_emulation: false
  startup_delay_ms: 0

tgxl:
  enabled: true
  port: 9010
  strict_emulation: false
  startup_delay_ms: 0

kpa500:
  enabled: true
  com_port: COM21
  baud: 38400
  polling_interval_ms: 1000
  mock: false
  dry_run: true

kat500:
  enabled: true
  com_port: COM8
  baud: 38400
  polling_interval_ms: 1000
  mock: false
  dry_run: true

security:
  token:

logging:
  level: debug
  protocol_trace: true
  protocol_transcript_dir: logs/protocol
  serial_transcript_dir: logs/serial

metrics:
  enabled: true
  bind_ip: 127.0.0.1
  port: 9160
