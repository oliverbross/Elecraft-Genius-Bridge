server:
  # Use 127.0.0.1 for local testing, or a specific private LAN IP for macOS AetherSDR.
  bind_ip: 127.0.0.1

pgxl:
  enabled: true
  port: 9008
  aethersdr_compat: true
  strict_emulation: false
  startup_delay_ms: 0

tgxl:
  enabled: true
  port: 9010
  aethersdr_compat: true
  strict_emulation: false
  startup_delay_ms: 0
  force_presence_test: false

kpa500:
  enabled: true
  com_port: COM21
  baud: 38400
  polling_interval_ms: 1000
  mock: false
  dry_run: true

kat500:
  enabled: true
  com_port: COM8
  baud: 38400
  polling_interval_ms: 1000
  mock: false
  dry_run: true

security:
  token:

logging:
  level: debug
  protocol_trace: true
  protocol_transcript_dir: logs/protocol
  serial_transcript_dir: logs/serial
  transcript_rotate_bytes: 1048576

metrics:
  enabled: true
  bind_ip: 127.0.0.1
  port: 9160

control:
  verify_delay_ms: 200

mock:
  pgxl_fault: false
  tgxl_fault: false
  high_swr: false
