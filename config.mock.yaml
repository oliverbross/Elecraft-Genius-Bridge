server:
  # Change to the Windows LAN IP when testing from macOS AetherSDR.
  bind_ip: 127.0.0.1

pgxl:
  enabled: true
  port: 9008

tgxl:
  enabled: true
  port: 9010

kpa500:
  enabled: true
  com_port: COM21
  baud: 38400
  polling_interval_ms: 1000
  mock: true
  dry_run: true

kat500:
  enabled: true
  com_port: COM8
  baud: 38400
  polling_interval_ms: 1000
  mock: true
  dry_run: true

security:
  token:

logging:
  level: debug
  protocol_trace: true
  protocol_transcript_dir: logs/protocol
  serial_transcript_dir:
